<body>
    <h1>eToro WebSocket Test</h1>
    <div id="logs"></div>
    
    <script>
        // TOKEN COMPLETO capturado do Burp - COPIE EXATAMENTE ESTE
        const TOKEN = "eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2Q0JDLUhTNTEyIiwidHlwIjoiSldUIiwiY3R5IjoiSldUIn0..FBpl0RFd2cMPGmUvuFZ9SQ.vEF-1JOcuT_YHdbPCBfCvK9FO-XwD_x4c73xZD1Dwjek1bTtCUc9TmLzWQJYip7CEMh5DvWL9qj9M8YOocE8COoHFseqKZAgicIrgN0YqkMhfVXnGqtJogc-ZihXGMLxGhoolSITLy7mclGbhdfkdeLx-wUnYBs9glnr54QnlR_hx7BQ6Kt7uHNbcZ3q77h4JXT1ePXDZqnfdbEJSTuGvJk4g5ZqWmUGchXBSbDqpj_qJoj1ncHZ6mIuk8VyyfbbBEYn3YqSDhQLkLNn6atl7iTII330XfTfdddJpDYVufh97qgzsZKmsNRYEAZmh2lfSiEpi3n9giD_NJxJ8HDICWnnhNmSvX9cwagwdFjLpOcSu6TDaNsAtcmOCtdbH8_2BWrK8rbk40cDK1C1tXR3MQ.mFqpvm7ylgDINxR0Ewu_M7-OCOIko9fQske0z3wDakk";
        
        const logDiv = document.getElementById('logs');
        
        function addLog(msg, type = 'info') {
            const p = document.createElement('div');
            p.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            p.style.color = type === 'error' ? 'red' : (type === 'success' ? 'green' : 'black');
            logDiv.appendChild(p);
            console.log(msg);
        }
        
        addLog('🚀 Iniciando teste...');
        addLog('📍 Origem: ' + window.location.origin);
        addLog('🔑 Token tamanho: ' + TOKEN.length);
        
        const ws = new WebSocket("wss://ws.etoro.com/ws");
        
        ws.onopen = () => {
            addLog('✅ CONEXÃO ESTABELECIDA!', 'success');
            
            // Usa o MESMO formato que o Burp capturou
            const authMsg = {
                id: crypto.randomUUID(),
                operation: "Authenticate",
                data: {
                    userKey: TOKEN,
                    apiKey: TOKEN
                }
            };
            
            addLog('📤 Enviando autenticação...');
            ws.send(JSON.stringify(authMsg));
        };
        
        ws.onmessage = async (event) => {
            let data = event.data;
            if (data instanceof Blob) {
                data = await data.text();
                addLog('📥 (Blob convertido): ' + data.substring(0, 500));
            } else {
                addLog('📥 (Texto): ' + data.substring(0, 500));
            }
            
            try {
                const resp = JSON.parse(data);
                if (resp.success === true) {
                    addLog('🔥🔥🔥 AUTENTICAÇÃO FUNCIONOU! 🔥🔥🔥', 'success');
                } else {
                    addLog('❌ Resposta: ' + resp.errorMessage, 'error');
                }
            } catch(e) {
                addLog('📥 Resposta não-JSON: ' + data.substring(0, 200));
            }
        };
        
        ws.onerror = (error) => {
            addLog('❌ Erro: ' + error, 'error');
        };
        
        ws.onclose = (event) => {
            addLog('🔌 Conexão fechada: ' + event.code + ' - ' + event.reason, 'error');
        };
    </script>
</body>
</html>
