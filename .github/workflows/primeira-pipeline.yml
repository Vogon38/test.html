name: PR Target + Fork Execution Test

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Show context
        run: |
          echo "=== CONTEXT ==="
          echo "event: $GITHUB_EVENT_NAME"
          echo "repo: $GITHUB_REPOSITORY"
          echo "sha: $GITHUB_SHA"
          echo "actor: $GITHUB_ACTOR"

      - name: Show if secret exists
        env:
          TEST_MASKED: ${{ secrets.TEST_MASKED }}
        run: |
          if [ -z "$TEST_MASKED" ]; then
            echo "SECRET: NOT AVAILABLE"
          else
            echo "SECRET: AVAILABLE"
          fi

      - name: Checkout PR code (fork)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Show repo files (fork code inside privileged context)
        run: |
          echo "=== FILES ==="
          ls -la
