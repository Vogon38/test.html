name: Secret Test

on:
  workflow_dispatch:

jobs:
  check-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Test transformations
        env:
          SECRET_TEST: ${{ secrets.SECRET_TEST }}
        run: |
          echo "=== Original ==="
          echo "$SECRET_TEST"

          echo "=== Reverse ==="
          echo "$SECRET_TEST" | rev

          echo "=== Base64 ==="
          echo "$SECRET_TEST" | base64

          echo "=== Hex ==="
          echo "$SECRET_TEST" | xxd -p

          echo "=== Add hyphens ==="
          echo "$SECRET_TEST" | sed 's/./&-/g'
